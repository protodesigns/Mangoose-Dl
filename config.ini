# DL Mongoose - Production-Grade Configuration
# This file contains build & deployment settings

# Build Settings
[build]
debug = false
optimize = true
minimum_python = "3.10"

# Application Settings
[app]
name = "DL Mongoose"
version = "2.0.0"
author = "DL Mongoose Team"
description = "Production-grade YouTube downloader"

# Performance
[performance]
max_concurrent_downloads = 1
worker_timeout = 30
internet_check_interval = 5
progress_update_interval = 0.5

# Features
[features]
enable_tray = true
enable_history = true
enable_auto_retry = true
max_retries = 3
